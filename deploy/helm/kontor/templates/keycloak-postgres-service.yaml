{{- if and .Values.keycloak.deploy (eq .Values.keycloak.database "postgres") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kontor.keycloak.postgres.fullname" . }}
  labels:
    {{- include "kontor.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-db
spec:
  type: ClusterIP
  clusterIP: None    # headless — matches the StatefulSet's serviceName.
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "kontor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-db
{{- end }}
