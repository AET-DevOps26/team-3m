name: Deploy to Azure

# Manually triggered. Provisions the VM with Terraform, then starts the stack.
#
# Secrets: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID,
#          AZURE_SUBSCRIPTION_ID, AZURE_POSTGRES_PASSWORD,
#          AZURE_KEYCLOAK_POSTGRES_PASSWORD,
#          AZURE_KEYCLOAK_ADMIN_PASSWORD, AZURE_KEYCLOAK_DEV_PASSWORD
# Variables: AZURE_ACME_EMAIL, AZURE_KEYCLOAK_ADMIN_USER, AZURE_DOMAIN,
#            AZURE_KEYCLOAK_SEED_DEV_USER
#
# DNS model: `AZURE_DOMAIN` (default azure.kontor.live) is fronted by a single
# CNAME in GoDaddy pointing at Terraform output `domain`
# (= `<dns_label>.<region>.cloudapp.azure.com`). The Azure FQDN tracks whichever
# public IP the VM currently has, so the CNAME never has to be updated even
# when the infrastructure is destroyed and recreated.

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Public domain the stack is served on (must CNAME to the Azure FQDN)."
        required: false
        type: string
        default: "azure.kontor.live"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: azure

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Prepare Terraform SSH public key
        env:
          AZURE_SSH_PUBLIC_KEY: ${{ vars.AZURE_SSH_PUBLIC_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/azure-ssh"
          printf '%s\n' "$AZURE_SSH_PUBLIC_KEY" > "$RUNNER_TEMP/azure-ssh/team-3m-azure-rsa.pub"
          echo "TF_VAR_admin_ssh_public_key_path=$RUNNER_TEMP/azure-ssh/team-3m-azure-rsa.pub" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: deploy/azure
        run: terraform init

      - name: Terraform apply
        working-directory: deploy/azure
        run: |
          terraform apply -auto-approve
          {
            echo "AZURE_FQDN=$(terraform output -raw domain)"
            echo "PUBLIC_IP=$(terraform output -raw public_ip_address)"
          } >> "$GITHUB_ENV"

      - name: Resolve public domain
        env:
          INPUT_DOMAIN: ${{ inputs.domain }}
          VAR_DOMAIN: ${{ vars.AZURE_DOMAIN }}
        run: |
          DOMAIN="${INPUT_DOMAIN:-${VAR_DOMAIN:-azure.kontor.live}}"
          echo "DOMAIN=$DOMAIN" >> "$GITHUB_ENV"
          echo "Public domain:    $DOMAIN"
          echo "Azure FQDN:       $AZURE_FQDN"
          echo "VM public IP:     $PUBLIC_IP   (for reference; not used for DNS)"
          echo
          echo "DNS expected (one-time, at the DNS provider for kontor.live):"
          echo "  $DOMAIN       CNAME  $AZURE_FQDN"
          echo "  auth.$DOMAIN  CNAME  $AZURE_FQDN"
          echo "Traefik's ACME challenge will fail until both CNAMEs resolve."

      - name: Deploy app
        env:
          ENV_FILE: |
            DOMAIN=${{ env.DOMAIN }}
            ACME_EMAIL=${{ vars.AZURE_ACME_EMAIL }}
            POSTGRES_PASSWORD=${{ secrets.AZURE_POSTGRES_PASSWORD }}
            KEYCLOAK_POSTGRES_PASSWORD=${{ secrets.AZURE_KEYCLOAK_POSTGRES_PASSWORD }}
            KEYCLOAK_ADMIN_USER=${{ vars.AZURE_KEYCLOAK_ADMIN_USER }}
            KEYCLOAK_ADMIN_PASSWORD=${{ secrets.AZURE_KEYCLOAK_ADMIN_PASSWORD }}
            KEYCLOAK_SEED_DEV_USER=${{ vars.AZURE_KEYCLOAK_SEED_DEV_USER }}
            KEYCLOAK_DEV_PASSWORD=${{ secrets.AZURE_KEYCLOAK_DEV_PASSWORD }}
            KONTOR_AI_IMAGE_TAG=${{ vars.AZURE_AI_IMAGE_TAG || 'latest' }}
          DEPLOY_REF: ${{ github.ref }}
        run: |
          az login --service-principal \
            --username "$ARM_CLIENT_ID" \
            --password "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" \
            --output none

          ENV_B64=$(printf '%s' "$ENV_FILE" | base64 -w 0)
          DEPLOY_REF_B64=$(printf '%s' "$DEPLOY_REF" | base64 -w 0)

          az vm run-command invoke \
            --resource-group "Kontor" \
            --name "kontor-vm" \
            --command-id RunShellScript \
            --scripts "
              set -eu
              cloud-init status --wait

              REPO_DIR=/home/azureuser/team-3m
              DEPLOY_REF=\$(printf '%s' '$DEPLOY_REF_B64' | base64 -d)

              if [ ! -d \"\$REPO_DIR/.git\" ]; then
                rm -rf \"\$REPO_DIR\"
                git clone --no-checkout --filter=blob:none https://github.com/AET-DevOps26/team-3m.git \"\$REPO_DIR\"
              fi

              git -C \"\$REPO_DIR\" fetch --depth 1 origin \"\$DEPLOY_REF\"
              git -C \"\$REPO_DIR\" checkout --force FETCH_HEAD
              git -C \"\$REPO_DIR\" clean -fdx
              echo '$ENV_B64' | base64 -d > \"\$REPO_DIR/.env\"

              cd \"\$REPO_DIR\"
              docker compose -f docker-compose.azure.yml pull
              docker compose -f docker-compose.azure.yml up -d

              # When the demo dev user is seeded, also seed the example
              # transactions so it lands in a ready-to-explore environment.
              # Idempotent SQL (ON CONFLICT DO NOTHING); retried until core's
              # Flyway migrations have created the schema.
              SEED_DEV_USER=\$(grep -E '^KEYCLOAK_SEED_DEV_USER=' \"\$REPO_DIR/.env\" | cut -d= -f2- || true)
              if [ \"\$SEED_DEV_USER\" = true ]; then
                echo 'Seeding example transactions for the demo dev user...'
                seeded=false
                for i in \$(seq 1 60); do
                  if docker compose -f docker-compose.azure.yml exec -T db \
                       sh -c 'psql -v ON_ERROR_STOP=1 -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\"' \
                       < \"\$REPO_DIR/infra/db/seed/azure-example-transactions.sql\"; then
                    echo 'Example transactions seeded.'
                    seeded=true
                    break
                  fi
                  echo \"Schema not ready yet (attempt \$i/60); retrying in 5s...\"
                  sleep 5
                done
                if [ \"\$seeded\" != true ]; then
                  echo 'ERROR: Example transaction seeding failed after 60 attempts.' >&2
                  exit 1
                fi
              fi
            "
