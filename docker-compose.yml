services:
  db:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-team3m}"
      POSTGRES_USER: "${POSTGRES_USER:-team3m}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-local}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  core:
    build:
      context: ./core
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DATABASE_URL: "${APP_DATABASE_URL:-jdbc:postgresql://db:5432/team3m}"
      APP_DATABASE_USERNAME: "${APP_DATABASE_USERNAME:-team3m}"
      APP_DATABASE_PASSWORD: "${APP_DATABASE_PASSWORD:-change-me-local}"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/hello >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  client:
    build:
      context: ./client
    depends_on:
      core:
        condition: service_healthy
    ports:
      - "5173:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
