{{- if and .Values.keycloak.deploy (not .Values.keycloak.admin.existingSecret) }}
{{- if not .Values.keycloak.admin.password -}}
{{- fail "keycloak.admin.password is required when keycloak.deploy is true and keycloak.admin.existingSecret is not set. Supply via -f secrets.yaml (see secrets.example.yaml) or --set keycloak.admin.password=..." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kontor.keycloak.secretName" . }}
  labels:
    {{- include "kontor.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
type: Opaque
stringData:
  KC_BOOTSTRAP_ADMIN_USERNAME: {{ .Values.keycloak.admin.username | quote }}
  KC_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.keycloak.admin.password | quote }}
{{- end }}
