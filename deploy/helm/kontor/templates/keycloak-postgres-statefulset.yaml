{{- if and .Values.keycloak.deploy (eq .Values.keycloak.database "postgres") }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kontor.keycloak.postgres.fullname" . }}
  labels:
    {{- include "kontor.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-db
spec:
  serviceName: {{ include "kontor.keycloak.postgres.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "kontor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: keycloak-db
  template:
    metadata:
      labels:
        {{- include "kontor.labels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak-db
    spec:
      securityContext:
        {{- toYaml .Values.keycloak.db.podSecurityContext | nindent 8 }}
      containers:
        - name: postgres
          image: {{ include "kontor.image" (dict "root" . "component" .Values.keycloak.db) | quote }}
          imagePullPolicy: {{ include "kontor.imagePullPolicy" (dict "root" . "component" .Values.keycloak.db) }}
          securityContext:
            {{- toYaml .Values.keycloak.db.containerSecurityContext | nindent 12 }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "kontor.keycloak.postgres.secretName" . }}
          env:
            # Use a subdir of the mounted PVC so initdb doesn't trip on lost+found.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.keycloak.db.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
      {{- with .Values.keycloak.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.keycloak.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.keycloak.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if not .Values.keycloak.db.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.keycloak.db.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "kontor.labels" . | nindent 10 }}
          app.kubernetes.io/component: keycloak-db
      spec:
        accessModes:
          {{- toYaml .Values.keycloak.db.persistence.accessModes | nindent 10 }}
        {{- with .Values.keycloak.db.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.keycloak.db.persistence.size | quote }}
  {{- end }}
{{- end }}
