name: Helm Quality

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  CHART: deploy/helm/kontor
  # Dummy secrets so the chart's `fail` guards (postgres/keycloak passwords) pass
  # during lint/template/scan. Never used at runtime.
  HELM_SECRETS: >-
    --set postgres.password=ci
    --set keycloak.admin.password=ci
    --set keycloak.db.password=ci

jobs:
  quality:
    name: Lint, Validate & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.0

      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: v0.6.7
          KUBECONFORM_SHA256: 95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73
        run: |
          set -euo pipefail
          curl -sSLo /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  /tmp/kubeconform.tar.gz" | sha256sum --check --status
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo install /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.71.0

      - name: Lint & schema-validate each values file
        run: |
          set -euo pipefail
          for values in values.yaml values-prod.yaml values-pr.template.yaml; do
            echo "::group::$values"
            if [ "$values" = "values.yaml" ]; then
              overlay=""
            elif [ "$values" = "values-pr.template.yaml" ]; then
              PR_NUMBER=0 BASE_DOMAIN=preview.example.com \
                envsubst '${PR_NUMBER} ${BASE_DOMAIN}' < "$CHART/$values" > "/tmp/$values"
              overlay="-f /tmp/$values"
            else
              overlay="-f $CHART/$values"
            fi
            helm lint --strict "$CHART" $overlay $HELM_SECRETS
            helm template kontor "$CHART" $overlay $HELM_SECRETS \
              | kubeconform -strict -summary -kubernetes-version 1.30.0 -schema-location default
            echo "::endgroup::"
          done

      - name: Trivy misconfiguration scan (prod-rendered manifests)
        run: |
          set -euo pipefail
          rm -rf /tmp/rendered
          helm template kontor "$CHART" -f "$CHART/values-prod.yaml" $HELM_SECRETS \
            --output-dir /tmp/rendered
          trivy config /tmp/rendered --severity HIGH,CRITICAL --exit-code 1 --ignorefile .trivyignore.yaml
