name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  client-quality:
    uses: ./.github/workflows/client-quality.yml

  server-quality:
    uses: ./.github/workflows/server-quality.yml
    with:
      working-directory: core

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          base: ${{ github.ref_name }}
          filters: |
            deploy:
              - 'deploy/**'
              - '.github/workflows/helm-quality.yml'
              - '.github/workflows/ci-cd.yml'
              - '.trivyignore.yaml'

  helm-quality:
    needs: changes
    if: ${{ needs.changes.outputs.deploy == 'true' }}
    uses: ./.github/workflows/helm-quality.yml

  openapi-sync:
    uses: ./.github/workflows/openapi-sync.yml

  release:
    name: Semantic Release
    needs: [client-quality, server-quality, changes, helm-quality, openapi-sync]
    if: ${{ !cancelled()
      && needs.client-quality.result == 'success'
      && needs.server-quality.result == 'success'
      && needs.openapi-sync.result == 'success'
      && needs.helm-quality.result != 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      latest-version: ${{ steps.latest.outputs.version }}
      sha: ${{ steps.sha.outputs.sha }}

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get post-release commit SHA
        id: sha
        run: |
          git fetch origin main
          echo "sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"

      - name: Resolve latest version tag
        id: latest
        run: |
          git fetch --tags --force --quiet
          tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  client-docker:
    needs: release
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    uses: ./.github/workflows/docker-build-push.yml
    with:
      context: client
      image-name: kontor-client
      version: ${{ needs.release.outputs.version }}
      released: ${{ needs.release.outputs.released == 'true' }}
      ref: ${{ needs.release.outputs.sha }}

  server-docker:
    needs: release
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    uses: ./.github/workflows/docker-build-push.yml
    with:
      context: core
      image-name: kontor-core
      version: ${{ needs.release.outputs.version }}
      released: ${{ needs.release.outputs.released == 'true' }}
      ref: ${{ needs.release.outputs.sha }}

  deploy-prod:
    needs: [release, client-docker, server-docker]
    if: ${{ !cancelled()
      && needs.release.result == 'success'
      && needs.client-docker.result == 'success'
      && needs.server-docker.result == 'success'
      && (needs.release.outputs.released == 'true' || github.event_name == 'workflow_dispatch') }}
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      environment: k8s-prod
      release-name: kontor
      namespace: team-3m
      image-tag: ${{ needs.release.outputs.released == 'true' && needs.release.outputs.version || needs.release.outputs.latest-version }}
      action: deploy
