plugins {
	id 'java'
	id 'checkstyle'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.diffplug.spotless' version '8.5.1'
	id 'net.ltgt.errorprone' version '5.1.0'
}

group = 'de.devops26.kontor'
version = '0.1.0'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	runtimeOnly 'org.postgresql:postgresql'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	errorprone 'com.google.errorprone:error_prone_core:2.49.0'
}

tasks.named('test') {
	useJUnitPlatform()
}

spotless {
	java {
        palantirJavaFormat('2.90.0')
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
        formatAnnotations()
    }
}

checkstyle {
	toolVersion = '13.4.2'
	configFile = file("${rootDir}/config/checkstyle/checkstyle.xml")
	maxWarnings = 0
}

tasks.withType(JavaCompile).configureEach {
	options.errorprone {
		disableWarningsInGeneratedCode = true
	}
	// Gradle 9 defaults to --should-stop=ifError=INIT which Error Prone doesn't support
	options.compilerArgs += ['-XDshould-stop.ifError=FLOW']
	// Required for Error Prone to access internal compiler APIs on Java 21+
	options.forkOptions.jvmArgs += [
		'--add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED',
		'--add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
		'--add-opens=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED',
	]
}
