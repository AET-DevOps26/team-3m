name: Deploy to Azure

# Manually triggered. Provisions the VM with Terraform, then starts the stack.
#
# Secrets: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID,
#          AZURE_SUBSCRIPTION_ID, AZURE_ALLOWED_SSH_CIDR

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: deploy/azure
        run: terraform init

      - name: Terraform apply
        working-directory: deploy/azure
        env:
          TF_VAR_allowed_ssh_source_address_prefix: ${{ secrets.AZURE_ALLOWED_SSH_CIDR }}
        run: terraform apply -auto-approve

      - name: Deploy app
        run: |
          az login --service-principal \
            --username "$ARM_CLIENT_ID" \
            --password "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" \
            --output none
          az vm run-command invoke \
            --resource-group "Kontor" \
            --name "kontor-vm" \
            --command-id RunShellScript \
            --scripts "cd /home/azureuser/team-3m && git pull && docker compose -f docker-compose.azure.yml up -d --build"
