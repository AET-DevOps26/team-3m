exclude: ^(deliverables/|resources/)|(\.svg$)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: biome-check
        name: Biome Check
        entry: bash -c 'cd client && npx biome check --write --files-ignore-unknown=true --no-errors-on-unmatched "${@#client/}"' --
        language: system
        files: ^client/
      - id: gradle-core-quality
        name: Spotless and Checkstyle
        entry: bash -c 'cd core && ./gradlew spotlessCheck checkstyleMain checkstyleTest'
        language: system
        files: ^core/.*\.java$
        pass_filenames: false
