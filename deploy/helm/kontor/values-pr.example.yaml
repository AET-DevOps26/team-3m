# Example values for an ephemeral PR preview environment (here: PR #123).
# Each PR env is fully self-contained: it deploys the app AND its own throwaway
# Keycloak (in-memory, no DB/PVC). Everything is torn down with `helm delete`.
# CI templates the "123" / hostnames per PR.
# Requires -f secrets.yaml with postgres.password (app DB) and
# keycloak.admin.password.

client:
  apiBaseUrl: ""

core:
  corsAllowedOrigins:
    - https://pr-123.team-3m.stud.k8s.aet.cit.tum.de

oidc:
  # issuerUrl is left empty: it defaults to the first keycloak hostname + realm,
  # i.e. https://auth.pr-123.team-3m.stud.k8s.aet.cit.tum.de/realms/kontor
  redirectUri: https://pr-123.team-3m.stud.k8s.aet.cit.tum.de/
  postLogoutRedirectUri: https://pr-123.team-3m.stud.k8s.aet.cit.tum.de/

keycloak:
  deploy: true
  database: dev-mem
  hostnames:
    - auth.pr-123.team-3m.stud.k8s.aet.cit.tum.de
  hostnameStrict: true
  realm:
    seedDevUser: true
    redirectUris:
      - https://pr-123.team-3m.stud.k8s.aet.cit.tum.de/*
    webOrigins:
      - https://pr-123.team-3m.stud.k8s.aet.cit.tum.de

ingress:
  hosts:
    - pr-123.team-3m.stud.k8s.aet.cit.tum.de
  tls:
    clusterIssuer: letsencrypt-staging
