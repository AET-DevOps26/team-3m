name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  client-quality:
    uses: ./.github/workflows/client-quality.yml

  server-quality:
    uses: ./.github/workflows/server-quality.yml
    with:
      working-directory: core

  release:
    name: Semantic Release
    needs: [client-quality, server-quality]
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      sha: ${{ steps.sha.outputs.sha }}

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get post-release commit SHA
        id: sha
        run: |
          git fetch origin main
          echo "sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"

  client-docker:
    needs: release
    uses: ./.github/workflows/docker-build-push.yml
    with:
      context: client
      image-name: kontor-client
      version: ${{ needs.release.outputs.version }}
      released: ${{ needs.release.outputs.released == 'true' }}
      ref: ${{ needs.release.outputs.sha }}

  server-docker:
    needs: release
    uses: ./.github/workflows/docker-build-push.yml
    with:
      context: core
      image-name: kontor-core
      version: ${{ needs.release.outputs.version }}
      released: ${{ needs.release.outputs.released == 'true' }}
      ref: ${{ needs.release.outputs.sha }}
