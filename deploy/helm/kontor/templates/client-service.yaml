apiVersion: v1
kind: Service
metadata:
  name: {{ include "kontor.client.fullname" . }}
  labels:
    {{- include "kontor.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  type: {{ .Values.client.service.type }}
  ports:
    - name: http
      port: {{ .Values.client.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "kontor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: client
