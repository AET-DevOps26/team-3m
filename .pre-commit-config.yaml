exclude: ^(deliverables/|resources/)|(\.svg$)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^deploy/helm/.*/templates/
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: biome-check
        name: Biome Check
        entry: bash -c 'cd client && npx biome check --write --files-ignore-unknown=true --no-errors-on-unmatched "${@#client/}"' --
        language: system
        files: ^client/
      - id: gradle-core-quality
        name: Spotless and Checkstyle
        entry: bash -c 'cd core && ./gradlew spotlessCheck checkstyleMain checkstyleTest'
        language: system
        files: ^core/.*\.java$
        pass_filenames: false
      - id: helm-lint
        name: Helm Lint
        entry: bash -c 'c=deploy/helm/kontor; s="--set postgres.password=ci --set keycloak.admin.password=ci --set keycloak.db.password=ci"; for v in values.yaml values-prod.yaml values-pr.template.yaml; do o=""; [ "$v" = values.yaml ] || o="-f $c/$v"; helm lint --strict "$c" $o $s || exit 1; done'
        language: system
        files: ^deploy/helm/
        pass_filenames: false
      - id: openapi-core-generate
        name: Generate core OpenAPI spec
        entry: bash -c 'cd core && ./gradlew generateOpenApiDocs'
        language: system
        files: ^core/src/main/java/.*(Controller|ApiResponse|Result)\.java$
        pass_filenames: false
      - id: openapi-client-generate
        name: Generate client API types
        entry: bash -c 'cd client && npm run generate:api'
        language: system
        files: ^core/(src/main/java/.*\.java|docs/openapi\.yml)$
        pass_filenames: false
      - id: ty-check
        name: Ty Type Check
        entry: bash -c 'cd ai && uv run ty check'
        language: system
        files: ^ai/.*\.py$
        pass_filenames: false
      - id: ruff-format
        name: Ruff Format
        entry: bash -c 'cd ai && uv run ruff format .'
        language: system
        files: ^ai/.*\.py$
        pass_filenames: false
      - id: ruff-lint
        name: Ruff Lint
        entry: bash -c 'cd ai && uv run ruff check --fix .'
        language: system
        files: ^ai/.*\.py$
        pass_filenames: false
