spring:
  datasource:
    url: jdbc:tc:postgresql:18-trixie:///team3m
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: team3m
    password: team3m
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Tests use SecurityMockMvcRequestPostProcessors.jwt() to inject mock
          # authentication; this URL is never contacted.
          jwk-set-uri: http://localhost:0/realms/test/protocol/openid-connect/certs

kontor:
  security:
    issuer: http://localhost:0/realms/test
    audience: kontor-api-test
