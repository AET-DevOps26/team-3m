{{- if and .Values.keycloak.deploy (eq .Values.keycloak.database "postgres") (not .Values.keycloak.db.existingSecret) }}
{{- if not .Values.keycloak.db.password -}}
{{- fail "keycloak.db.password is required when keycloak.deploy is true and keycloak.db.existingSecret is not set. Supply via -f secrets.yaml (see secrets.example.yaml) or --set keycloak.db.password=..." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kontor.keycloak.postgres.secretName" . }}
  labels:
    {{- include "kontor.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-db
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.keycloak.db.database | quote }}
  POSTGRES_USER: {{ .Values.keycloak.db.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.keycloak.db.password | quote }}
{{- end }}
