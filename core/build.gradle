plugins {
	id 'java'
	id 'checkstyle'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.diffplug.spotless' version '7.0.2'
	id 'net.ltgt.errorprone' version '4.0.1'
	id 'org.owasp.dependencycheck' version '12.1.0'
	id 'com.github.ben-manes.versions' version '0.51.0'
}

group = 'de.devops26.kontor'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	errorprone 'com.google.errorprone:error_prone_core:2.36.0'
}

tasks.named('test') {
	useJUnitPlatform()
}

spotless {
	java {
		eclipse()
		removeUnusedImports()
		trimTrailingWhitespace()
		endWithNewline()
	}
}

checkstyle {
	toolVersion = '10.21.4'
	configFile = file("${rootDir}/config/checkstyle/checkstyle.xml")
	maxWarnings = 0
}

tasks.withType(JavaCompile).configureEach {
	options.errorprone {
		disableWarningsInGeneratedCode = true
	}
	// Gradle 9 defaults to --should-stop=ifError=INIT which Error Prone doesn't support
	options.compilerArgs += ['-XDshould-stop.ifError=FLOW']
	// Required for Error Prone to access internal compiler APIs on Java 21+
	options.forkOptions.jvmArgs += [
		'--add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED',
		'--add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
		'--add-opens=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED',
	]
}

dependencyCheck {
	failBuildOnCVSS = 7
	suppressionFile = "${rootDir}/config/owasp/suppressions.xml"
	data {
		directory = "${System.getProperty('user.home')}/.gradle/dependency-check-data"
	}
	nvd {
		apiKey = System.getenv('NVD_API_KEY') ?: ''
	}
	analyzers {
		ossIndex {
			enabled = false
		}
	}
}

dependencyUpdates {
	rejectVersionIf {
		isNonStable(it.candidate.version)
	}
}

def isNonStable(String version) {
	def stableKeyword = ['RELEASE', 'FINAL', 'GA'].any { version.toUpperCase().contains(it) }
	def regex = /^[0-9,.v-]+(-r)?$/
	return !stableKeyword && !(version ==~ regex)
}
