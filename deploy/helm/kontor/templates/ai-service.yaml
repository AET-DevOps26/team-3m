apiVersion: v1
kind: Service
metadata:
  name: {{ include "kontor.ai.fullname" . }}
  labels:
    {{- include "kontor.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai
spec:
  type: {{ .Values.ai.service.type }}
  ports:
    - name: http
      port: {{ .Values.ai.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "kontor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ai
