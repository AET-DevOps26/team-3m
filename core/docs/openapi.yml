openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost
  description: Generated server url
paths:
  /api/v1/financial-transactions/import:
    post:
      tags:
      - financial-transaction-controller
      operationId: importCsv
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        "200":
          description: CSV imported successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvImportApiResponse"
        "400":
          description: "Empty upload, malformed CSV, or row-level validation failure"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /api/v1/health/server:
    get:
      tags:
      - health-controller
      operationId: server
      responses:
        "200":
          description: Server is up
          content:
            '*/*':
              schema:
                type: string
        "503":
          description: Server is unhealthy
          content:
            '*/*':
              schema:
                type: string
  /api/v1/health/database:
    get:
      tags:
      - health-controller
      operationId: database
      responses:
        "200":
          description: Database connection OK
          content:
            '*/*':
              schema:
                type: string
        "503":
          description: Database connection check failed
          content:
            '*/*':
              schema:
                type: string
  /api/v1/financial-transactions:
    get:
      tags:
      - financial-transaction-controller
      operationId: listTransactions
      parameters:
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 200
      - name: afterDatetime
        in: query
        required: false
        schema:
          type: string
      - name: afterId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Transaction page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTransactionsApiResponse"
        "400":
          description: Invalid cursor parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
components:
  schemas:
    CsvImportApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/CsvImportResult"
        error:
          type:
          - string
          - "null"
        details:
          type:
          - array
          - "null"
          items: {}
      required:
      - success
    CsvImportResult:
      type: object
      properties:
        importedCount:
          type: integer
          format: int32
          minimum: 0
        message:
          type: string
      required:
      - importedCount
      - message
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data: {}
        error:
          type:
          - string
          - "null"
        details:
          type:
          - array
          - "null"
          items: {}
      required:
      - success
    FinancialTransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        datetime:
          type: string
          format: date-time
        date:
          type: string
          format: date
        accountType:
          type: string
        category:
          type: string
        type:
          type: string
        assetClass:
          type:
          - string
          - "null"
        name:
          type:
          - string
          - "null"
        symbol:
          type:
          - string
          - "null"
        shares:
          type:
          - number
          - "null"
        price:
          type:
          - number
          - "null"
        amount:
          type: number
        fee:
          type:
          - number
          - "null"
        tax:
          type:
          - number
          - "null"
        currency:
          type: string
        originalAmount:
          type:
          - number
          - "null"
        originalCurrency:
          type:
          - string
          - "null"
        fxRate:
          type:
          - number
          - "null"
        description:
          type:
          - string
          - "null"
        externalTransactionId:
          type:
          - string
          - "null"
          format: uuid
        counterpartyName:
          type:
          - string
          - "null"
        counterpartyIban:
          type:
          - string
          - "null"
        paymentReference:
          type:
          - string
          - "null"
        mccCode:
          type:
          - string
          - "null"
      required:
      - accountType
      - amount
      - category
      - currency
      - date
      - datetime
      - id
      - type
    ListTransactionsApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/TransactionPage"
        error:
          type:
          - string
          - "null"
        details:
          type:
          - array
          - "null"
          items: {}
      required:
      - success
    TransactionCursor:
      type: object
      properties:
        afterDatetime:
          type: string
          format: date-time
        afterId:
          type: string
          format: uuid
      required:
      - afterDatetime
      - afterId
    TransactionPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FinancialTransactionResponse"
        nextCursor:
          type: "null"
          $ref: "#/components/schemas/TransactionCursor"
      required:
      - items
