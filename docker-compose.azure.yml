services:
  traefik:
    image: traefik:v3
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-team3m}"
      POSTGRES_USER: "${POSTGRES_USER:-team3m}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  keycloak-db:
    image: postgres:18-trixie
    environment:
      POSTGRES_DB: "${KEYCLOAK_POSTGRES_DB:-keycloak}"
      POSTGRES_USER: "${KEYCLOAK_POSTGRES_USER:-keycloak}"
      POSTGRES_PASSWORD: "${KEYCLOAK_POSTGRES_PASSWORD}"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /opt/keycloak/data/import
        sed 's|DOMAIN_PLACEHOLDER|${DOMAIN}|g' /realm-template/kontor-realm.json \
          > /opt/keycloak/data/import/kontor-realm.json
        if [ "${KEYCLOAK_SEED_DEV_USER:-false}" = "true" ]; then
          sed 's|KEYCLOAK_DEV_PASSWORD_PLACEHOLDER|${KEYCLOAK_DEV_PASSWORD}|g' /realm-template/kontor-azure-users-0.json > /opt/keycloak/data/import/kontor-users-0.json
        fi
        exec /opt/keycloak/bin/kc.sh start --import-realm
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN_USER}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: "${KEYCLOAK_POSTGRES_DB:-keycloak}"
      KC_DB_USERNAME: "${KEYCLOAK_POSTGRES_USER:-keycloak}"
      KC_DB_PASSWORD: "${KEYCLOAK_POSTGRES_PASSWORD}"
      # Keycloak is served on its own subdomain (auth.<DOMAIN>), with no
      # relative-path prefix — issuer URLs are https://auth.<DOMAIN>/realms/...
      KC_HOSTNAME: "https://${KEYCLOAK_DOMAIN:-auth.${DOMAIN}}"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_DOMAIN:-auth.${DOMAIN}}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=le"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    volumes:
      - ./infra/keycloak/realms:/realm-template:ro
    healthcheck:
      # Health probes live on the management port (9000) at /health/*.
      # The image ships neither curl nor wget, so probe via Bash's /dev/tcp
      # and parse the HTTP status line.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n1 <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  core:
    image: ghcr.io/aet-devops26/team-3m/kontor-core:latest
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-team3m}"
      POSTGRES_USER: "${POSTGRES_USER:-team3m}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      KEYCLOAK_ISSUER: "https://${KEYCLOAK_DOMAIN:-auth.${DOMAIN}}/realms/kontor"
      KEYCLOAK_JWK_SET_URI: "http://keycloak:8080/realms/kontor/protocol/openid-connect/certs"
      KEYCLOAK_AUDIENCE: "${KEYCLOAK_AUDIENCE:-kontor-api}"
      APP_CORS_ALLOWED_ORIGINS: "https://${DOMAIN}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.core.entrypoints=websecure"
      - "traefik.http.routers.core.tls.certresolver=le"
      - "traefik.http.services.core.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health/liveness >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  client:
    image: ghcr.io/aet-devops26/team-3m/kontor-client:latest
    depends_on:
      core:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: "https://${DOMAIN}"
      VITE_OIDC_AUTHORITY: "https://${KEYCLOAK_DOMAIN:-auth.${DOMAIN}}/realms/kontor"
      VITE_OIDC_CLIENT_ID: "kontor-spa"
      VITE_OIDC_REDIRECT_URI: "https://${DOMAIN}/auth/callback"
      VITE_OIDC_POST_LOGOUT_REDIRECT_URI: "https://${DOMAIN}/"
      VITE_OIDC_AUDIENCE: "kontor-api"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.client.entrypoints=websecure"
      - "traefik.http.routers.client.tls.certresolver=le"
      - "traefik.http.services.client.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ai:
    image: ghcr.io/aet-devops26/team-3m/kontor-ai:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=Host(`${DOMAIN}`) && PathPrefix(`/ai`)"
      - "traefik.http.routers.ai.entrypoints=websecure"
      - "traefik.http.routers.ai.tls.certresolver=le"
      - "traefik.http.services.ai.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ai/health/readiness >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  keycloak_postgres_data:
  letsencrypt:
