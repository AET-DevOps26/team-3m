name: Teardown Azure

# Manually triggered. Stops the stack and destroys all Azure infrastructure.
# Uses the same "azure" environment and secrets as deploy-azure.yml.

on:
  workflow_dispatch:

jobs:
  teardown:
    name: Teardown
    runs-on: ubuntu-latest
    environment: azure

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: deploy/azure
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}"

      - name: Stop app
        continue-on-error: true
        run: |
          az login --service-principal \
            --username "$ARM_CLIENT_ID" \
            --password "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" \
            --output none
          az vm run-command invoke \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --name "${{ vars.VM_NAME }}" \
            --command-id RunShellScript \
            --scripts "cd /home/azureuser/team-3m && docker compose -f docker-compose.azure.yml down -v"

      - name: Terraform destroy
        working-directory: deploy/azure
        env:
          TF_VAR_allowed_ssh_source_address_prefix: ${{ secrets.ALLOWED_SSH_CIDR }}
        run: terraform destroy -auto-approve
