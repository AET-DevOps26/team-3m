# Production environment.
# Served on both kontor.live and the TUM cluster host; the ingress fronts the
# client (/) and core (/api) on each. The SPA therefore calls the API same-origin
# (empty apiBaseUrl) and returns to the host it was loaded from after login
# (empty redirect URIs -> the client uses window.location.origin), so both hosts
# work without cross-origin calls or a forced domain switch. Keycloak keeps a
# single fixed issuer (auth.kontor.live) — issuerUrl stays absolute.
# Keycloak runs its own instance here with strict hostname checks and no seeded user.
# Secrets (postgres.password, keycloak.admin.password, keycloak.db.password) come
# from -f secrets.yaml.

client:
  apiBaseUrl: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 96Mi

core:
  corsAllowedOrigins:
    - https://kontor.live
    - https://team-3m.stud.k8s.aet.cit.tum.de
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 700m
      memory: 704Mi

postgres:
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 350m
      memory: 416Mi

oidc:
  issuerUrl: https://auth.kontor.live/realms/kontor

keycloak:
  deploy: true
  database: postgres
  hostnames:
    - auth.kontor.live
    - auth.team-3m.stud.k8s.aet.cit.tum.de
  hostnameStrict: true
  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 512Mi
  db:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 192Mi
  realm:
    seedDevUser: false
    registrationAllowed: true
    redirectUris:
      - https://kontor.live/*
      - https://team-3m.stud.k8s.aet.cit.tum.de/*
    webOrigins:
      - https://kontor.live
      - https://team-3m.stud.k8s.aet.cit.tum.de

ingress:
  hosts:
    - kontor.live
    - team-3m.stud.k8s.aet.cit.tum.de
