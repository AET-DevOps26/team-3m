{{- if .Values.ingress.enabled }}
{{- /* Prefer the list form; fall back to the single `host` for back-compat. */ -}}
{{- $hosts := .Values.ingress.hosts }}
{{- if not $hosts }}
{{- $hosts = list .Values.ingress.host }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kontor.fullname" . }}
  labels:
    {{- include "kontor.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "kontor.core.fullname" $ }}
                port:
                  number: {{ $.Values.core.service.port }}
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: {{ include "kontor.ai.fullname" $ }}
                port:
                  number: {{ $.Values.ai.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "kontor.client.fullname" $ }}
                port:
                  number: {{ $.Values.client.service.port }}
    {{- end }}
{{- end }}
