server:
  port: 8080

spring:
  application:
    name: core
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:team3m}
    username: ${POSTGRES_USER:team3m}
    password: ${POSTGRES_PASSWORD:change-me-local}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/kontor/protocol/openid-connect/certs}

app:
  cors:
    allowed-origins:
      - http://localhost:5173

kontor:
  security:
    issuer: ${KEYCLOAK_ISSUER:http://localhost:8081/realms/kontor}
    audience: ${KEYCLOAK_AUDIENCE:kontor-api}

management:
  endpoints:
    web:
      base-path: /api
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        database:
          include: db
  info:
    build:
      enabled: true
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:dev}
