name: Docker Build & Push

on:
  workflow_call:
    inputs:
      context:
        description: "Build context directory (e.g. client, core)"
        required: true
        type: string
      image-name:
        description: "Image name without registry prefix (e.g. kontor-client)"
        required: true
        type: string
      version:
        description: "Semver version from release (empty if no release)"
        required: false
        type: string
        default: ""
      released:
        description: "Whether a release was created"
        required: false
        type: boolean
        default: false
      ref:
        description: "Git ref to checkout (defaults to triggering event SHA)"
        required: false
        type: string
        default: ""
      push:
        description: "Push image to registry"
        required: false
        type: boolean
        default: true
    outputs:
      digest:
        description: "Image digest (sha256)"
        value: ${{ jobs.build.outputs.digest }}
      metadata:
        description: "Build result metadata"
        value: ${{ jobs.build.outputs.metadata }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      metadata: ${{ steps.build-push.outputs.metadata }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ inputs.image-name }}
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && inputs.released }}
            type=sha

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
