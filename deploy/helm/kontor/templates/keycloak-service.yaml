{{- if .Values.keycloak.deploy }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kontor.keycloak.fullname" . }}
  labels:
    {{- include "kontor.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: {{ .Values.keycloak.service.type }}
  ports:
    - name: http
      port: {{ .Values.keycloak.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: management
      port: {{ .Values.keycloak.service.managementPort }}
      targetPort: management
      protocol: TCP
  selector:
    {{- include "kontor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
{{- end }}
