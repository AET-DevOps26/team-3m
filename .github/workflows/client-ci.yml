name: Client CI

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/client-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/client-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint & Check Formatting with Biome
        run: npm run lint:ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
