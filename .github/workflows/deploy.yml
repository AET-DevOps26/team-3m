name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: "GH Environment + values overlay (k8s-prod | k8s-preview)"
        required: true
        type: string
      release-name:
        description: "Helm release name"
        required: true
        type: string
      namespace:
        description: "Target namespace (created in the Rancher project if missing)"
        required: true
        type: string
      image-tag:
        description: "Tag pinned for core+client (semver for prod, sha-<short> for preview)"
        required: false
        type: string
        default: ""
      pr-number:
        description: "PR number, used to template preview hostnames"
        required: false
        type: string
        default: ""
      base-domain:
        description: "Base domain for preview hostnames (pr-<N>.<base-domain>)"
        required: false
        type: string
        default: "team-3m.stud.k8s.aet.cit.tum.de"
      action:
        description: "deploy | teardown"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.namespace }}
  cancel-in-progress: false

env:
  CHART: deploy/helm/kontor
  NS_TEMPLATE: deploy/rbac/namespace.tpl

jobs:
  deploy:
    name: ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 8

    steps:
      - name: Checkout (deploy/ only)
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          sparse-checkout: deploy

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl auth whoami

      - name: Ensure namespace (in Rancher project)
        if: inputs.action == 'deploy'
        env:
          NAMESPACE: ${{ inputs.namespace }}
          RANCHER_PROJECT_ID: ${{ vars.RANCHER_PROJECT_ID }}
        run: |
          set -euo pipefail
          export RANCHER_PROJECT_LABEL="${RANCHER_PROJECT_ID#*:}"
          envsubst < "$NS_TEMPLATE" | kubectl apply -f -

      - name: Recover stuck release
        if: inputs.action == 'deploy'
        env:
          RELEASE: ${{ inputs.release-name }}
          NAMESPACE: ${{ inputs.namespace }}
        run: |
          set -euo pipefail
          status="$(helm status "$RELEASE" -n "$NAMESPACE" -o json 2>/dev/null \
            | jq -r '.info.status' || true)"
          echo "Current release status: ${status:-<none>}"
          case "$status" in
            pending-install)
              echo "Stuck in pending-install (first install never completed); uninstalling."
              helm uninstall "$RELEASE" -n "$NAMESPACE" --wait --timeout 2m || true
              ;;
            pending-upgrade|pending-rollback)
              echo "Stuck in $status; rolling back to last deployed revision."
              helm rollback "$RELEASE" -n "$NAMESPACE" --wait --timeout 3m \
                || { echo "Rollback failed; uninstalling."; helm uninstall "$RELEASE" -n "$NAMESPACE" --wait --timeout 2m || true; }
              ;;
            *)
              echo "No recovery needed."
              ;;
          esac

      - name: Helm deploy (prod)
        if: inputs.action == 'deploy' && inputs.environment == 'k8s-prod'
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          KEYCLOAK_DB_PASSWORD: ${{ secrets.KEYCLOAK_DB_PASSWORD }}
        run: |
          set -euo pipefail
          helm upgrade --install '${{ inputs.release-name }}' "$CHART" \
            -n '${{ inputs.namespace }}' \
            -f "$CHART/values-prod.yaml" \
            --set-string core.image.tag='${{ inputs.image-tag }}' \
            --set-string client.image.tag='${{ inputs.image-tag }}' \
            --set-string ai.image.tag='${{ inputs.image-tag }}' \
            --set-string postgres.password="$POSTGRES_PASSWORD" \
            --set-string keycloak.admin.password="$KEYCLOAK_ADMIN_PASSWORD" \
            --set-string keycloak.db.password="$KEYCLOAK_DB_PASSWORD" \
            --rollback-on-failure --wait --timeout 4m

      - name: Helm deploy (preview)
        if: inputs.action == 'deploy' && inputs.environment == 'k8s-preview'
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          PR_NUMBER: ${{ inputs.pr-number }}
          BASE_DOMAIN: ${{ inputs.base-domain }}
        run: |
          set -euo pipefail
          envsubst '${PR_NUMBER} ${BASE_DOMAIN}' \
            < "$CHART/values-pr.template.yaml" > /tmp/values-pr.yaml
          helm upgrade --install '${{ inputs.release-name }}' "$CHART" \
            -n '${{ inputs.namespace }}' \
            -f /tmp/values-pr.yaml \
            --set-string core.image.tag='${{ inputs.image-tag }}' \
            --set-string client.image.tag='${{ inputs.image-tag }}' \
            --set-string ai.image.tag='${{ inputs.image-tag }}' \
            --set-string postgres.password="$POSTGRES_PASSWORD" \
            --set-string keycloak.admin.password="$KEYCLOAK_ADMIN_PASSWORD" \
            --rollback-on-failure --wait --timeout 4m

      - name: Helm teardown
        if: inputs.action == 'teardown'
        run: |
          set -euo pipefail
          helm uninstall '${{ inputs.release-name }}' -n '${{ inputs.namespace }}' --wait || true
          kubectl delete namespace '${{ inputs.namespace }}' --ignore-not-found --wait=false
