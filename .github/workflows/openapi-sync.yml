name: OpenAPI Sync

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: OpenAPI spec and client types are up to date
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Regenerate OpenAPI spec
        run: ./gradlew generateOpenApiDocs
        working-directory: core

      - name: Regenerate client API types
        run: npm run generate:api
        working-directory: client

      - name: Check for uncommitted diff
        run: |
          git diff --exit-code core/docs/openapi.yml client/src/network/generated || {
            echo "Generated files are out of sync. Run ./gradlew generateOpenApiDocs in core/ and npm run generate:api in client/, then commit the results."
            exit 1
          }
