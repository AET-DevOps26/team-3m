# -- Override the auto-generated release name fragment used in resource names.
nameOverride: ""
# -- Fully override the chart name used in resource names.
fullnameOverride: ""

# Common image pull configuration.
image:
  # -- Default container registry; overridden per service below if set.
  registry: ghcr.io
  # -- Default image pull policy.
  pullPolicy: IfNotPresent

# OIDC / authentication config consumed by the app.
oidc:
  # -- Issuer / authority URL.
  issuerUrl: ""
  # -- Fetch JWKS from the in-cluster Keycloak Service over HTTP instead of the
  # public issuer URL. For preview envs whose ingress serves an untrusted
  # (Let's Encrypt staging) cert the core JVM can't validate. Token `iss`
  # validation still uses issuerUrl. Requires keycloak.deploy=true.
  internalJwks: false
  # -- Realm name. Used to build the default issuerUrl and names the realm import.
  realm: kontor
  # -- Public OIDC client ID for the SPA
  clientId: kontor-spa
  # -- Audience expected in issued access tokens.
  audience: kontor-api
  # -- Redirect URI.
  redirectUri: ""
  # -- Post-logout redirect URI.
  postLogoutRedirectUri: ""

# Spring Boot core service.
core:
  image:
    repository: aet-devops26/team-3m/kontor-core
    tag: ""              # defaults to .Chart.AppVersion
    pullPolicy: ""       # falls back to image.pullPolicy
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  # -- Spring profiles to activate (SPRING_PROFILES_ACTIVE). Empty keeps the app default.
  springProfilesActive: ""
  # File upload limits, propagated to Spring's multipart config. Empty values
  # keep the application defaults.
  multipart:
    # -- Max size of a single uploaded file (SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE).
    maxFileSize: ""
    # -- Max size of an entire multipart request (SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE).
    maxRequestSize: ""
  # CORS allowed origins, propagated as APP_CORS_ALLOWED_ORIGINS (comma-separated).
  # Leave empty to let the application defaults apply.
  corsAllowedOrigins: []
  # Escape hatch for arbitrary extra non-secret env vars merged into the pod,
  # for config not covered by the typed values above.
  env: {}
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  probes:
    # Spring Boot Actuator health groups, served under the /api base path.
    livenessPath: /api/health/liveness
    readinessPath: /api/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Python/FastAPI AI service.
ai:
  image:
    repository: aet-devops26/team-3m/kontor-ai
    tag: ""
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
  env: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  probes:
    livenessPath: /ai/health/liveness
    readinessPath: /ai/health/readiness
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}

# React/nginx client.
client:
  image:
    repository: aet-devops26/team-3m/kontor-client
    tag: ""
    pullPolicy: ""
  replicaCount: 1
  # Runtime configuration injected into the SPA at container startup by vite-envs.
  # -- Public base URL of the deployment, rendered as VITE_API_BASE_URL, e.g.
  # https://kontor.example.com (no /api suffix — the client appends /api/v1/...).
  # Leave empty to call the API same-origin (relative /api), which keeps the SPA
  # working unchanged across every host the ingress serves.
  apiBaseUrl: ""
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  probes:
    livenessPath: /
    readinessPath: /
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101    # nginx-unprivileged user
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false   # nginx writes pid + temp files
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Postgres (with pgvector) — single-instance StatefulSet.
postgres:
  enabled: true
  image:
    registry: docker.io
    repository: pgvector/pgvector
    tag: pg18-trixie
    pullPolicy: ""
  service:
    port: 5432
  database: kontor
  username: kontor
  # Override via secrets.yaml
  password: ""
  # When set, the chart will not create the postgres Secret and will instead
  # mount the named existing Secret. Expected keys: POSTGRES_DB, POSTGRES_USER,
  # POSTGRES_PASSWORD.
  existingSecret: ""
  persistence:
    enabled: true
    size: 8Gi
    # csi-rbd-sc is the cluster default; left empty so it's picked up automatically.
    storageClass: "csi-rbd-sc"
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # The postgres user in the image is uid/gid 999; run as it explicitly so
  # runAsNonRoot is satisfied, and set fsGroup so the PVC mount is writable.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Keycloak identity provider.
# `deploy` controls whether THIS release stands up a Keycloak server.
keycloak:
  deploy: false
  # Database backing Keycloak:
  #   postgres  — dedicated Postgres StatefulSet, persistent (use for prod).
  #   dev-mem   — in-memory H2, ephemeral, no Postgres/PVC (use for short-lived
  #               PR preview environments that get their own throwaway Keycloak).
  database: postgres
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.6"
    pullPolicy: ""
  replicaCount: 1
  # First-boot bootstrap admin. Create a real admin and disable this account after
  # the first deploy (see deploy notes); rotate via the Secret.
  admin:
    username: admin
    # REQUIRED when deploy=true and existingSecret is empty — the render fails
    # otherwise. Supply via secrets.yaml or --set.
    password: ""
    # When set, the chart mounts this existing Secret instead of creating one.
    # Expected keys: KC_BOOTSTRAP_ADMIN_USERNAME, KC_BOOTSTRAP_ADMIN_PASSWORD.
    existingSecret: ""
  # -- Public hostnames Keycloak is served on. The FIRST entry is the canonical
  # KC_HOSTNAME / issuer base; every entry gets an ingress rule + TLS host.
  hostnames: []
  # -- KC_HOSTNAME_STRICT. Keep true for public deployments; relax only in dev.
  hostnameStrict: true
  # Keycloak's own ingress. Independent of the app `ingress.enabled` toggle so a
  # Keycloak-only release (the shared auth server) can disable the app ingress
  # while still exposing Keycloak. Reuses `ingress.className` / `ingress.tls.*`.
  ingress:
    enabled: true
  service:
    type: ClusterIP
    # Public HTTP port (behind the TLS-terminating ingress).
    httpPort: 8080
    # Management port for health/metrics — kept ClusterIP-only, never in ingress.
    managementPort: 9000
  # Dedicated Postgres for Keycloak (only used when database=postgres) — separate
  # failure/backup domain from the app DB.
  db:
    image:
      registry: docker.io
      repository: pgvector/pgvector
      tag: pg18-trixie
      pullPolicy: ""
    database: keycloak
    username: keycloak
    # REQUIRED when deploy=true and existingSecret is empty.
    password: ""
    # Existing Secret with keys: POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD.
    existingSecret: ""
    persistence:
      enabled: true
      size: 8Gi
      storageClass: "csi-rbd-sc"
      accessModes:
        - ReadWriteOnce
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Same pattern as the app Postgres: run as the image's postgres uid/gid 999
    # so runAsNonRoot is satisfied, and set fsGroup so the PVC is writable.
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
  # Templated realm import (the "dynamic realm import file"). Rendered into a
  # ConfigMap and imported with `--import-realm`. With database=postgres the realm
  # is imported only if absent (persists); with dev-mem it is re-imported fresh on
  # every start (fine for throwaway PR envs).
  realm:
    # -- Valid redirect URIs for the SPA client (this env's hosts).
    redirectUris: []
    # -- Web origins (CORS) for the SPA client.
    webOrigins: []
    # -- sslRequired: external for public deployments — never "none".
    sslRequired: external
    # -- Allow self-service user registration (the "Register" link on the login page).
    registrationAllowed: false
    # -- Seed a dev/dev test user. Dev / PR instances only; false in prod.
    seedDevUser: false
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  probes:
    # Health endpoints live on the management port (9000) in Keycloak 26+.
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  # Only the flags the restricted Pod Security policy actually requires; the
  # image's own USER 1000 / GID 0 are relied on, not overridden.
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Single nginx ingress fronting both services.
# Client at "/" and core at "/api". TLS via cert-manager.
ingress:
  enabled: true
  className: nginx
  # -- Hostnames to advertise. Each entry renders one ingress rule and one
  # TLS host, all backed by `tls.secretName`. Override per environment.
  hosts: []
  # -- Deprecated single-host form. Used as a fallback only when `hosts` is
  # empty, so existing single-host consumers keep working.
  host: kontor.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
  tls:
    enabled: true
    # -- ClusterIssuer to use. The shared cluster has `letsencrypt-prod` and
    # `letsencrypt-staging`. Use staging while iterating to avoid rate limits.
    clusterIssuer: letsencrypt-prod
    # -- Secret holding the cert; cert-manager creates it on first issue.
    secretName: kontor-tls

# Defense-in-depth on a shared cluster: restrict who can talk to what.
networkPolicy:
  enabled: true
  # -- When true, the only egress allowed from app pods is to in-cluster
  # services + DNS + the configured Postgres pod. Set to false if your app
  # needs to reach Yahoo Finance / OpenAI / etc. directly from the cluster.
  restrictEgress: false
