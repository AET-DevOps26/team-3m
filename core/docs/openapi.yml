openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost
  description: Generated server url
paths:
  /api/v1/financial-transactions/import:
    post:
      tags:
      - financial-transaction-controller
      operationId: importCsv
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        "200":
          description: CSV imported successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvImportApiResponse"
        "400":
          description: "Empty upload, malformed CSV, or row-level validation failure"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /api/v1/portfolio/performance:
    get:
      tags:
      - portfolio-controller
      operationId: getPerformance
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePortfolioPerformance"
  /api/v1/portfolio/overview:
    get:
      tags:
      - portfolio-controller
      operationId: getOverview
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePortfolioOverview"
  /api/v1/health/server:
    get:
      tags:
      - health-controller
      operationId: server
      responses:
        "200":
          description: Server is up
          content:
            '*/*':
              schema:
                type: string
        "503":
          description: Server is unhealthy
          content:
            '*/*':
              schema:
                type: string
  /api/v1/health/database:
    get:
      tags:
      - health-controller
      operationId: database
      responses:
        "200":
          description: Database connection OK
          content:
            '*/*':
              schema:
                type: string
        "503":
          description: Database connection check failed
          content:
            '*/*':
              schema:
                type: string
components:
  schemas:
    CsvImportApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/CsvImportResult"
        error:
          type: string
        details:
          type: array
          items: {}
      required:
      - success
    CsvImportResult:
      type: object
      properties:
        importedCount:
          type: integer
          format: int32
          minimum: 0
        message:
          type: string
      required:
      - importedCount
      - message
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data: {}
        error:
          type:
          - string
          - "null"
        details:
          type:
          - array
          - "null"
          items: {}
      required:
      - success
    ApiResponsePortfolioPerformance:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PortfolioPerformance"
        error:
          type:
          - string
          - "null"
        details:
          type:
          - array
          - "null"
          items: {}
      required:
      - success
    PortfolioPerformance:
      type: object
      properties:
        snapshots:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioSnapshot"
        currency:
          type: string
    PortfolioSnapshot:
      type: object
      properties:
        date:
          type: string
          format: date
        value:
          type: number
    ApiResponsePortfolioOverview:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PortfolioOverview"
        error:
          type:
          - string
          - "null"
        details:
          type:
          - array
          - "null"
          items: {}
      required:
      - success
    PortfolioHolding:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        assetClass:
          type: string
        currency:
          type: string
        shares:
          type: number
        lastPrice:
          type: number
        currentValue:
          type: number
    PortfolioOverview:
      type: object
      properties:
        holdings:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioHolding"
        cashBalance:
          type: number
        currency:
          type: string
        totalValue:
          type: number
