name: Bootstrap Environments

on:
  pull_request:

jobs:
  prod:
    runs-on: ubuntu-latest
    environment: prod      # creates "prod" if it doesn't exist
    steps:
      - run: echo "ensured prod environment"

  preview:
    runs-on: ubuntu-latest
    environment: preview   # creates "preview" if it doesn't exist
    steps:
      - run: echo "ensured preview environment"
