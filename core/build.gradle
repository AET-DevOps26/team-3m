plugins {
	id 'java'
	id 'checkstyle'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.diffplug.spotless' version '8.5.1'
	id 'net.ltgt.errorprone' version '5.1.0'
	id 'org.jooq.jooq-codegen-gradle' version '3.19.32'
}

group = 'de.devops26.kontor'
version = '0.2.0'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-jooq'
	implementation 'org.springframework.boot:spring-boot-starter-flyway'
	implementation 'org.flywaydb:flyway-database-postgresql'
	implementation 'org.apache.commons:commons-csv:1.14.1'
	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.3'
	runtimeOnly 'org.postgresql:postgresql'
	jooqCodegen 'org.jooq:jooq-meta-extensions:3.19.32'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testImplementation 'org.springframework.boot:spring-boot-testcontainers'
	testImplementation 'org.testcontainers:testcontainers-junit-jupiter:2.0.5'
	testImplementation 'org.testcontainers:testcontainers-postgresql:2.0.5'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	errorprone 'com.google.errorprone:error_prone_core:2.49.0'
}

jooq {
	configuration {
		generator {
			name = 'org.jooq.codegen.DefaultGenerator'
			database {
				name = 'org.jooq.meta.extensions.ddl.DDLDatabase'
				properties {
					property {
						key = 'scripts'
						value = 'src/main/resources/db/migration/*.sql'
					}
					property {
						key = 'sort'
						value = 'flyway'
					}
					property {
						key = 'defaultNameCase'
						value = 'lower'
					}
				}
			}
			generate {
				records = true
				fluentSetters = true
				javaTimeTypes = true
				daos = false
				pojos = false
			}
			target {
				packageName = 'de.devops26.kontor.core.generated'
				directory = layout.buildDirectory.dir('generated-sources/jooq').get().asFile.path
			}
		}
	}
}

sourceSets {
	main {
		java {
			srcDir layout.buildDirectory.dir('generated-sources/jooq')
		}
	}
}

tasks.named('jooqCodegen').configure {
	inputs.files(fileTree('src/main/resources/db/migration'))
		.withPropertyName('migrations')
		.withPathSensitivity(PathSensitivity.RELATIVE)
}

tasks.named('compileJava') {
	dependsOn 'jooqCodegen'
}

tasks.named('test') {
	useJUnitPlatform()
}

tasks.register('generateOpenApiDocs', Test) {
	group = 'documentation'
	description = 'Generates docs/openapi.yml from the running Spring MVC controllers.'
	useJUnitPlatform()
	testClassesDirs = sourceSets.test.output.classesDirs
	classpath = sourceSets.test.runtimeClasspath
	filter {
		includeTestsMatching 'de.devops26.kontor.core.OpenApiDocumentationTest'
	}
	inputs.files(fileTree('src/main/java').matching {
			include '**/*Controller.java'
			include '**/*ApiResponse.java'
			include '**/*Result.java'
		})
		.withPropertyName('apiSources')
		.withPathSensitivity(PathSensitivity.RELATIVE)
	systemProperty 'openapi.write', 'true'
	outputs.file('docs/openapi.yml')
}

spotless {
	java {
        palantirJavaFormat('2.90.0')
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
        formatAnnotations()
        targetExclude 'build/**'
    }
}

checkstyle {
	toolVersion = '13.4.2'
	configFile = file("${rootDir}/config/checkstyle/checkstyle.xml")
	maxWarnings = 0
}

tasks.named('checkstyleMain') {
	source = fileTree('src/main/java')
}

tasks.withType(JavaCompile).configureEach {
	options.errorprone {
		disableWarningsInGeneratedCode = true
	}
	// Gradle 9 defaults to --should-stop=ifError=INIT which Error Prone doesn't support
	options.compilerArgs += ['-XDshould-stop.ifError=FLOW']
	// Required for Error Prone to access internal compiler APIs on Java 21+
	options.forkOptions.jvmArgs += [
		'--add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
		'--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED',
		'--add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
		'--add-opens=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED',
	]
}
