{{- if and .Values.postgres.enabled (not .Values.postgres.existingSecret) }}
{{- if not .Values.postgres.password -}}
{{- fail "postgres.password is required when postgres.existingSecret is not set. Supply via -f secrets.yaml (see secrets.example.yaml) or --set postgres.password=..." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kontor.postgres.secretName" . }}
  labels:
    {{- include "kontor.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
{{- end }}
