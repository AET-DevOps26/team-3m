name: Deploy to Azure

# Manually triggered. Provisions the VM with Terraform, then starts the stack.
#
# Secrets: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID,
#          AZURE_SUBSCRIPTION_ID, AZURE_ALLOWED_SSH_CIDR,
#          AZURE_POSTGRES_PASSWORD, AZURE_KEYCLOAK_POSTGRES_PASSWORD,
#          AZURE_KEYCLOAK_ADMIN_PASSWORD
# Variables: AZURE_ACME_EMAIL, AZURE_KEYCLOAK_ADMIN_USER, AZURE_DOMAIN
#
# DNS model: `AZURE_DOMAIN` (default azure.kontor.live) is fronted by a single
# CNAME in GoDaddy pointing at Terraform output `domain`
# (= `<dns_label>.<region>.cloudapp.azure.com`). The Azure FQDN tracks whichever
# public IP the VM currently has, so the CNAME never has to be updated even
# when the infrastructure is destroyed and recreated.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      domain:
        description: "Public domain the stack is served on (must CNAME to the Azure FQDN)."
        required: false
        type: string
        default: "azure.kontor.live"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: deploy/azure
        run: terraform init

      - name: Terraform apply
        working-directory: deploy/azure
        env:
          TF_VAR_allowed_ssh_source_address_prefix: ${{ secrets.AZURE_ALLOWED_SSH_CIDR }}
        run: |
          terraform apply -auto-approve
          {
            echo "AZURE_FQDN=$(terraform output -raw domain)"
            echo "PUBLIC_IP=$(terraform output -raw public_ip_address)"
          } >> "$GITHUB_ENV"

      - name: Resolve public domain
        env:
          INPUT_DOMAIN: ${{ inputs.domain }}
          VAR_DOMAIN: ${{ vars.AZURE_DOMAIN }}
        run: |
          DOMAIN="${INPUT_DOMAIN:-${VAR_DOMAIN:-azure.kontor.live}}"
          echo "DOMAIN=$DOMAIN" >> "$GITHUB_ENV"
          echo "Public domain:    $DOMAIN"
          echo "Azure FQDN:       $AZURE_FQDN"
          echo "VM public IP:     $PUBLIC_IP   (for reference; not used for DNS)"
          echo
          echo "DNS expected (one-time, at the DNS provider for kontor.live):"
          echo "  $DOMAIN       CNAME  $AZURE_FQDN"
          echo "  auth.$DOMAIN  CNAME  $AZURE_FQDN"
          echo "Traefik's ACME challenge will fail until both CNAMEs resolve."

      - name: Deploy app
        env:
          ENV_FILE: |
            DOMAIN=${{ env.DOMAIN }}
            ACME_EMAIL=${{ vars.AZURE_ACME_EMAIL }}
            POSTGRES_PASSWORD=${{ secrets.AZURE_POSTGRES_PASSWORD }}
            KEYCLOAK_POSTGRES_PASSWORD=${{ secrets.AZURE_KEYCLOAK_POSTGRES_PASSWORD }}
            KEYCLOAK_ADMIN_USER=${{ vars.AZURE_KEYCLOAK_ADMIN_USER }}
            KEYCLOAK_ADMIN_PASSWORD=${{ secrets.AZURE_KEYCLOAK_ADMIN_PASSWORD }}
        run: |
          az login --service-principal \
            --username "$ARM_CLIENT_ID" \
            --password "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" \
            --output none

          ENV_B64=$(printf '%s' "$ENV_FILE" | base64 -w 0)

          az vm run-command invoke \
            --resource-group "Kontor" \
            --name "kontor-vm" \
            --command-id RunShellScript \
            --scripts "
              git clone --depth 1 https://github.com/AET-DevOps26/team-3m.git /home/azureuser/team-3m 2>/dev/null \
                || git -C /home/azureuser/team-3m pull
              echo '$ENV_B64' | base64 -d > /home/azureuser/team-3m/.env
              cd /home/azureuser/team-3m
              docker compose -f docker-compose.azure.yml pull
              docker compose -f docker-compose.azure.yml up -d
            "
