services:
  db:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-team3m}"
      POSTGRES_USER: "${POSTGRES_USER:-team3m}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-local}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  keycloak-db:
    image: postgres:18-trixie
    environment:
      POSTGRES_DB: "${KEYCLOAK_POSTGRES_DB:-keycloak}"
      POSTGRES_USER: "${KEYCLOAK_POSTGRES_USER:-keycloak}"
      POSTGRES_PASSWORD: "${KEYCLOAK_POSTGRES_PASSWORD:-change-me-local}"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Local development only: this service uses start-dev and imports the realm
  # into a persistent local Keycloak Postgres database.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN_USER:-admin}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: "${KEYCLOAK_POSTGRES_DB:-keycloak}"
      KC_DB_USERNAME: "${KEYCLOAK_POSTGRES_USER:-keycloak}"
      KC_DB_PASSWORD: "${KEYCLOAK_POSTGRES_PASSWORD:-change-me-local}"
      KC_HOSTNAME: "${KEYCLOAK_HOSTNAME:-localhost}"
      KC_HOSTNAME_PORT: "${KEYCLOAK_PORT:-8081}"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_DEV_USERS_PASSWORD: "${KEYCLOAK_DEV_USERS_PASSWORD:-dev}"
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
      - "${KEYCLOAK_MGMT_PORT:-9000}:9000"
    volumes:
      - ./infra/keycloak/realms:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          exec 3<>/dev/tcp/127.0.0.1/9000
          && printf 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          && grep -q '"status": "UP"' <&3
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  core:
    build:
      context: ./core
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-team3m}"
      POSTGRES_USER: "${POSTGRES_USER:-team3m}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-local}"
      KEYCLOAK_ISSUER: "http://localhost:${KEYCLOAK_PORT:-8081}/realms/kontor"
      KEYCLOAK_JWK_SET_URI: "http://keycloak:8080/realms/kontor/protocol/openid-connect/certs"
      KEYCLOAK_AUDIENCE: "${KEYCLOAK_AUDIENCE:-kontor-api}"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  client:
    build:
      context: ./client
    depends_on:
      core:
        condition: service_healthy
    ports:
      - "5173:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  ai:
    build:
      context: ./ai
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ai/health/readiness >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  keycloak_postgres_data:
